<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <title>Kkut Shot</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>Kkut Shot</h1>
        <p id="status">YouTube 영상에서 열어주세요.</p>
      </header>

      <section>
        <div class="row">
          <span>영상</span>
          <strong id="title">-</strong>
        </div>
        <div class="row">
          <span>정답</span>
          <strong id="answer">-</strong>
        </div>
        <div class="row">
          <span>데이터</span>
          <strong id="updated">-</strong>
        </div>
      </section>

      <label>
        answers.json URL
        <input id="data-url" type="url" placeholder="https://.../answers.json">
      </label>

      <button id="refresh-data" type="button">정답 데이터 새로고침</button>
      <button id="refresh" type="button" class="secondary">정보 새로고침</button>
    </main>
    <script src="../shared/time.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
