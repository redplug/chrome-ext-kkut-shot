<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <title>무비띵크 끝 샷!</title>
    <link rel="stylesheet" href="popup.css">
  </head>
  <body>
    <main>
      <header>
        <h1>무비띵크 끝 샷!</h1>
        <p id="status">YouTube 영상에서 열어주세요.</p>
      </header>

      <section>
        <div class="row">
          <span>선택 영상</span>
          <strong id="title">-</strong>
        </div>
        <div class="row">
          <span>정답</span>
          <strong id="answer">-</strong>
        </div>
        <div class="row">
          <span>최고 점수</span>
          <strong id="best-score">-</strong>
        </div>
        <div class="row">
          <span>최고 오차</span>
          <strong id="best-diff">-</strong>
        </div>
        <div class="row">
          <span>데이터</span>
          <strong id="updated">-</strong>
        </div>
      </section>

      <section class="list-section">
        <div class="section-title">등록된 영상</div>
        <div id="video-list" class="video-list"></div>
      </section>

      <section class="list-section">
        <div class="section-title">이 영상 기록</div>
        <div id="history-list" class="history-list"></div>
      </section>

      <label>
        answers.json URL
        <input id="data-url" type="url" placeholder="https://.../answers.json">
      </label>

      <button id="refresh-data" type="button">정답 데이터 새로고침</button>
      <button id="refresh" type="button" class="secondary">정보 새로고침</button>
    </main>
    <script src="../shared/time.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
